<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Account Payables Resume</title>
    <!-- Solo carga Chart.js y plugin una vez en el head -->
    <!-- Incluyendo Chart.js y plugin datalabels desde CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels" defer></script>
    <!-- Tu CSS -->
    <link rel="stylesheet" href="StyleAP.css" />
</head>
<body>
    <h1>Resumen de Cuentas por Pagar</h1>
    <form id="dataForm">
        <div>
            <label for="range1">1-30 días:</label>
            <input type="number" id="range1" step="0.01" min="0" placeholder="0.00" required />
        </div>
        <div>
            <label for="range2">31-60 días:</label>
            <input type="number" id="range2" step="0.01" min="0" placeholder="0.00" required />
        </div>
        <div>
            <label for="range3">61-90 días:</label>
            <input type="number" id="range3" step="0.01" min="0" placeholder="0.00" required />
        </div>
        <div>
            <label for="range4">91-180 días:</label>
            <input type="number" id="range4" step="0.01" min="0" placeholder="0.00" required />
        </div>
        <div>
            <label for="range5">+180 días:</label>
            <input type="number" id="range5" step="0.01" min="0" placeholder="0.00" required />
        </div>
        <button type="button" id="generateBtn">Generar Gráfico</button>
    </form>

    <div id="chartContainer">
        <canvas id="myChart"></canvas>
    </div>

    <!-- Incluye tu script personalizado al final, después de cargar las librerías -->
    <script src="JavaScript/JavaScriptAP.js"></script>
</body>
</html>
