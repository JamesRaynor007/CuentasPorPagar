<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Analysis</title>
    <link rel="stylesheet" href="style.css">
    <script src="javascript.js"></script>
</head>
<body>
    <header class="hero-header">
        <h1>AP Analysis, composition.</h1>
        <h2>Company Name</h2>
        <h3 id="current-date">Date will load here...</h3>
    </header>
    <main>
        <table id="ap-table" class="ap-table">
            <thead>
                <tr>
                    <th></th>
                    <th>1-30 days</th>
                    <th>31-60 days</th>
                    <th>61-90 days</th>
                    <th>91-180 days</th>
                    <th>+180 days</th>
                </tr>
            </thead>
            <tr class="input-row">
                <th>Total Amount</th>
                <td><input type="number" step="0.01" min="0" class="amount-input" data-col="1" id="input-1"></td>
                <td><input type="number" step="0.01" min="0" class="amount-input" data-col="2" id="input-2"></td>
                <td><input type="number" step="0.01" min="0" class="amount-input" data-col="3" id="input-3"></td>
                <td><input type="number" step="0.01" min="0" class="amount-input" data-col="4" id="input-4"></td>
                <td><input type="number" step="0.01" min="0" class="amount-input" data-col="5" id="input-5"></td>
            </tr>
            <tfoot>
                <tr class="summary-row">
                    <td>Percentage of Total</td>
                    <td id="pct-1">0%</td>
                    <td id="pct-2">0%</td>
                    <td id="pct-3">0%</td>
                    <td id="pct-4">0%</td>
                    <td id="pct-5">0%</td>
                </tr>
                <tr>
                    <td colspan="6"><span id="grand-total">Grand Total: $0.00</span></td>
                </tr>
            </tfoot>
        </table>
        <canvas id="column-chart" width="800" height="400" class="chart-canvas"></canvas>
    </main>
</body>
</html>
